services:
  db:
    image: postgres:16-alpine
    container_name: einbuergerungstest-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${LOCAL_POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: einbuergerungstest-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      BACKEND_PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL_FOR_DOCKER_BACKEND_CONTAINER}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
      TSC_WATCHFILE: FixedPollingInterval
      TSC_WATCHDIRECTORY: FixedPollingInterval
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    command:
      [
        "sh",
        "-c",
        "if [ ! -x node_modules/.bin/tsx ] || [ ! -f node_modules/express/package.json ]; then npm ci --include=dev; fi; if [ ! -f node_modules/.prisma/client/schema.prisma ] || ! cmp -s prisma/schema.prisma node_modules/.prisma/client/schema.prisma; then npx prisma generate; fi; npm run dev:docker",
      ]

volumes:
  postgres_data:
